<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DocuChat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, sans-serif;
    max-width: 720px;
    margin: 2rem auto;
    padding: 0 1rem;
  }
  h1 { font-size: 1.4rem; }
  #dropzone {
    border: 2px dashed #888;
    border-radius: 8px;
    padding: 1.5rem;
    text-align: center;
    cursor: pointer;
    margin-bottom: 0.5rem;
  }
  #dropzone.dragover { border-color: #3b82f6; background: rgba(59,130,246,0.08); }
  #urlForm { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  #urlForm input { flex: 1; }
  #status { font-size: 0.85rem; color: #666; min-height: 1.2em; margin-bottom: 1rem; }
  #chat {
    border: 1px solid #ccc;
    border-radius: 8px;
    min-height: 300px;
    max-height: 50vh;
    overflow-y: auto;
    padding: 0.75rem;
    margin-bottom: 0.5rem;
  }
  .msg { margin-bottom: 1rem; }
  .msg .role { font-weight: 600; font-size: 0.8rem; opacity: 0.7; }
  .msg .content { white-space: pre-wrap; }
  .sources { margin-top: 0.4rem; font-size: 0.8rem; opacity: 0.8; }
  .sources ol { margin: 0.2rem 0 0 1.2rem; padding: 0; }
  #chatForm { display: flex; gap: 0.5rem; }
  #chatForm input { flex: 1; }
  button { cursor: pointer; }
</style>
</head>
<body>
  <h1>📄 DocuChat — ask questions about your documents</h1>

  <div id="dropzone">Drag & drop a PDF / DOCX / TXT here, or click to choose a file</div>
  <input type="file" id="fileInput" accept=".pdf,.docx,.txt" style="display:none">

  <form id="urlForm">
    <input type="url" id="urlInput" placeholder="...or paste a URL to ingest">
    <button type="submit">Ingest URL</button>
  </form>

  <div id="status"></div>

  <div id="chat"></div>

  <form id="chatForm">
    <input type="text" id="promptInput" placeholder="Ask a question about your documents..." autocomplete="off">
    <button type="submit">Send</button>
  </form>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const urlForm = document.getElementById('urlForm');
const urlInput = document.getElementById('urlInput');
const statusEl = document.getElementById('status');
const chat = document.getElementById('chat');
const chatForm = document.getElementById('chatForm');
const promptInput = document.getElementById('promptInput');

function setStatus(text, isError = false) {
  statusEl.textContent = text;
  statusEl.style.color = isError ? '#dc2626' : '#666';
}

async function uploadFile(file) {
  setStatus(`Uploading ${file.name}...`);
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch('/upload', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Upload failed');
    setStatus(data.message);
  } catch (err) {
    setStatus(err.message, true);
  }
}

dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) uploadFile(fileInput.files[0]);
});
['dragover', 'dragenter'].forEach(evt =>
  dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.add('dragover'); })
);
['dragleave', 'drop'].forEach(evt =>
  dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.remove('dragover'); })
);
dropzone.addEventListener('drop', e => {
  const file = e.dataTransfer.files[0];
  if (file) uploadFile(file);
});

urlForm.addEventListener('submit', async e => {
  e.preventDefault();
  const url = urlInput.value.trim();
  if (!url) return;
  setStatus(`Ingesting ${url}...`);
  try {
    const res = await fetch('/upload_url', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Ingest failed');
    setStatus(data.message);
    urlInput.value = '';
  } catch (err) {
    setStatus(err.message, true);
  }
});

function addMessage(role) {
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `<div class="role">${role}</div><div class="content"></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div.querySelector('.content');
}

function renderSources(container, sources) {
  if (!sources || sources.length === 0) return;
  const box = document.createElement('div');
  box.className = 'sources';
  const items = sources
    .map(s => `<li>${s.file}${s.page != null ? ` (page ${s.page + 1})` : ''} — “${s.snippet}…”</li>`)
    .join('');
  box.innerHTML = `<strong>Sources:</strong><ol>${items}</ol>`;
  container.after(box);
}

chatForm.addEventListener('submit', async e => {
  e.preventDefault();
  const prompt = promptInput.value.trim();
  if (!prompt) return;
  promptInput.value = '';

  addMessage('You').textContent = prompt;
  const answerEl = addMessage('DocuChat');

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });
    if (!res.ok || !res.body) throw new Error('Chat request failed');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = JSON.parse(line.slice('data: '.length));

        if (payload.token) {
          answerEl.textContent += payload.token;
          chat.scrollTop = chat.scrollHeight;
        } else if (payload.error) {
          answerEl.textContent = `Error: ${payload.error}`;
        } else if (payload.done) {
          answerEl.textContent = payload.answer;
          renderSources(answerEl, payload.sources);
        }
      }
    }
  } catch (err) {
    answerEl.textContent = `Error: ${err.message}`;
  }
});
</script>
</body>
</html>
